name: Release

on:
  # Actions → Release → Run workflow → enter version (e.g. 0.2.0)
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version without v prefix (e.g. 0.2.0 or 0.2.0-beta.1)"
        required: true
        type: string

  # Or: bump package.json, then git tag v0.2.0 && git push origin v0.2.0
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm Trusted Publisher (OIDC)

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # workflow_dispatch: bump version, commit to main, push tag (publish job follows)
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate and bump version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

          bun -e '
            const pkg = await Bun.file("package.json").json();
            pkg.version = process.env.VERSION;
            await Bun.write("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          if git diff --cached --quiet; then
            echo "package.json already at $VERSION"
          else
            git commit -m "chore: release v${VERSION}"
            git push origin HEAD:main
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists locally"
          else
            git tag "v${VERSION}"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already on origin"
          else
            git push origin "v${VERSION}"
          fi

  # After prepare (workflow_dispatch) or on tag push: GitHub Release + npm publish via OIDC.
  # Note: tag pushes from GITHUB_TOKEN do not start a new workflow run, so publish must
  # also run in the same workflow_dispatch job graph as prepare.
  publish:
    needs: prepare
    if: |
      always() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && needs.prepare.result == 'success')
      )
    runs-on: ubuntu-latest
    environment: npm # must match Trusted Publisher "Environment name"
    permissions:
      contents: write
      id-token: write # required for npm Trusted Publisher OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_dispatch: prepare just pushed the release tag — check that out
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 + current npm required for Trusted Publisher OIDC (npm 11.5.1+)
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Resolve version from tag
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package.json matches tag
        run: |
          set -euo pipefail
          PKG_VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          TAG_VERSION="${{ steps.ver.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## Install"
            echo ""
            echo '```bash'
            echo "bun add -g proton-vpn-cli@${{ steps.ver.outputs.version }}"
            echo "# or from GitHub:"
            echo "bun install -g github:brandonkramer/proton-vpn-cli#${TAG}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}"
            else
              git log --pretty=format:"- %s (%h)" -20
            fi
            echo ""
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"

          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              --verify-tag \
              $PRERELEASE_FLAG
          fi

      - name: Publish to npm (Trusted Publisher)
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          if npm view "proton-vpn-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "npm already has proton-vpn-cli@${VERSION} — skipping publish"
            exit 0
          fi

          # setup-node injects a dummy NODE_AUTH_TOKEN that blocks OIDC — clear it
          unset NODE_AUTH_TOKEN
          npm install -g npm@latest
          npm --version

          # OIDC trusted publishing — no NPM_TOKEN required
          npm publish --access public --provenance
